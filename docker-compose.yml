version: '3.8'

services:
  neural-safety:
    build: 
      context: .
      dockerfile: Dockerfile
    image: neuralsafety/core:v1.0
    container_name: neuralsafety_engine
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=production
    env_file:
      - .env
    volumes:
      # Sincronização de Código em Tempo Real (Development/Hotfix Mode)
      - .:/app
      # Garantia de Persistência de Dados no Volume Mapeado
      - ./data:/app/data
    
    # Governança de Recursos Enterprise
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
