version: '3.8'

services:
  # ═══════════════════════════════
  # 1. CÉREBRO RELACIONAL (Control Plane)
  # ═══════════════════════════════
  postgres_batalhao:
    image: postgres:15-alpine
    container_name: postgres_batalhao
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=batalhao_admin
      - POSTGRES_PASSWORD=batalhao_secret
      - POSTGRES_DB=batalhao_control
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./core/mq/schema_postgres.sql:/docker-entrypoint-initdb.d/schema.sql
    deploy:
      resources:
        limits:
          memory: 512M

  # ═══════════════════════════════
  # 2. MENSAGERIA (Redis)
  # ═══════════════════════════════
  redis_batalhao:
    image: redis:7-alpine
    container_name: redis_batalhao
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - ./data/redis:/data
    command: redis-server --appendonly yes
    deploy:
      resources:
        limits:
          memory: 256M

  # ═══════════════════════════════
  # 3. INTELIGÊNCIA & GOVERNANÇA
  # ═══════════════════════════════
  batalhao_intelligence:
    build: .
    container_name: batalhao_intelligence
    restart: unless-stopped
    depends_on:
      - redis_batalhao
      - postgres_batalhao
    environment:
      - REDIS_URL=redis://redis_batalhao:6379
      - POSTGRES_URL=postgresql://batalhao_admin:batalhao_secret@postgres_batalhao:5432/batalhao_control
      - BATALHAO_ROLES=intelligence
      - LOG_LEVEL=DEBUG
    volumes:
      - .:/app

  batalhao_capture_control:
    build: .
    container_name: batalhao_capture_control
    restart: unless-stopped
    depends_on:
      - redis_batalhao
      - postgres_batalhao
    environment:
      - REDIS_URL=redis://redis_batalhao:6379
      - POSTGRES_URL=postgresql://batalhao_admin:batalhao_secret@postgres_batalhao:5432/batalhao_control
      - BATALHAO_ROLES=capture_control
      - LOG_LEVEL=DEBUG
    volumes:
      - .:/app
      - ./data/raw:/app/data/raw

  # ═══════════════════════════════
  # 4. EXECUTORES (I/O Heavy)
  # ═══════════════════════════════
  batalhao_worker_l0:
    build: .
    restart: unless-stopped
    depends_on:
      - redis_batalhao
      - postgres_batalhao
    environment:
      - REDIS_URL=redis://redis_batalhao:6379
      - POSTGRES_URL=postgresql://batalhao_admin:batalhao_secret@postgres_batalhao:5432/batalhao_control
      - BATALHAO_ROLES=l0
      - LOG_LEVEL=DEBUG
    deploy:
      replicas: 2
    volumes:
      - .:/app
      - ./data/raw:/app/data/raw

  batalhao_worker_l12:
    build: .
    restart: unless-stopped
    depends_on:
      - redis_batalhao
      - postgres_batalhao
    environment:
      - REDIS_URL=redis://redis_batalhao:6379
      - POSTGRES_URL=postgresql://batalhao_admin:batalhao_secret@postgres_batalhao:5432/batalhao_control
      - BATALHAO_ROLES=l12
      - LOG_LEVEL=DEBUG
    volumes:
      - .:/app
      - ./data/raw:/app/data/raw

#  batalhao_worker_l34:
#    build: .
#    restart: unless-stopped
#    depends_on:
#      - redis_batalhao
#      - postgres_batalhao
#    environment:
#      - REDIS_URL=redis://redis_batalhao:6379
#      - POSTGRES_URL=postgresql://batalhao_admin:batalhao_secret@postgres_batalhao:5432/batalhao_control
#      - BATALHAO_ROLES=l34
#      - LOG_LEVEL=DEBUG
#    volumes:
#      - .:/app
#      - ./data/raw:/app/data/raw

  # ═══════════════════════════════
  # 5. DATA CLEAR (CPU Heavy)
  # ═══════════════════════════════
  batalhao_worker_dataclear:
    build: .
    restart: unless-stopped
    depends_on:
      - redis_batalhao
      - postgres_batalhao
    environment:
      - REDIS_URL=redis://redis_batalhao:6379
      - POSTGRES_URL=postgresql://batalhao_admin:batalhao_secret@postgres_batalhao:5432/batalhao_control
      - BATALHAO_ROLES=dataclear
      - LOG_LEVEL=DEBUG
    deploy:
      replicas: 2
    volumes:
      - .:/app
      - ./data/raw:/app/data/raw
      - ./data/curated:/app/data/curated
