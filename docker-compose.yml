version: '3.8'

services:
  # ═══════════════════════════════
  # 1. CÉREBRO (Redis)
  # ═══════════════════════════════
  redis_batalhao:
    image: redis:7-alpine
    container_name: redis_batalhao
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - ./data/redis:/data
    command: redis-server --appendonly yes
    deploy:
      resources:
        limits:
          memory: 256M

  # ═══════════════════════════════
  # 2. MOTOR DE GUERRA (Orquestrador / Intelligence)
  # ═══════════════════════════════
  batalhao_intelligence:
    build: .
    container_name: batalhao_intelligence
    restart: unless-stopped
    depends_on:
      - redis_batalhao
    environment:
      - REDIS_URL=redis://redis_batalhao:6379
      - BATALHAO_ROLES=intelligence
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  # ═══════════════════════════════
  # 3. EXECUTORES (I/O Heavy)
  # ═══════════════════════════════
  batalhao_worker_l0:
    build: .
    restart: unless-stopped
    depends_on:
      - redis_batalhao
    environment:
      - REDIS_URL=redis://redis_batalhao:6379
      - BATALHAO_ROLES=l0
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '1.0'
          memory: 1G

  batalhao_worker_l12:
    build: .
    restart: unless-stopped
    depends_on:
      - redis_batalhao
    environment:
      - REDIS_URL=redis://redis_batalhao:6379
      - BATALHAO_ROLES=l12
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: '1.0'
          memory: 1G

  # ═══════════════════════════════
  # 4. DATA CLEAR (CPU Heavy)
  # ═══════════════════════════════
  batalhao_worker_dataclear:
    build: .
    restart: unless-stopped
    depends_on:
      - redis_batalhao
    environment:
      - REDIS_URL=redis://redis_batalhao:6379
      - BATALHAO_ROLES=dataclear
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
    volumes:
      - ./data/output:/app/data/output

  # ═══════════════════════════════
  # 3. RAG / API (FastAPI) — Opcional
  # ═══════════════════════════════
  neural-safety:
    build:
      context: .
      dockerfile: Dockerfile
    image: neuralsafety/core:v1.0
    container_name: neuralsafety_engine
    restart: unless-stopped
    # Sobrescreve o CMD padrão (Batalhão) para rodar o RAG
    command: ["uvicorn", "rag_generator:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=production
    env_file:
      - .env
    volumes:
      - .:/app
      - ./data:/app/data
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
    # Descomente a linha abaixo para desativar o RAG quando não precisar
    # profiles: ["rag"]
